<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clippin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* ===== Light / Dark Mode CSS Variables ===== */
    :root {
      --bg-primary: rgba(255, 255, 255, 0.94);
      --bg-titlebar: rgba(255, 255, 255, 0.55);
      --bg-content: rgba(0,0,0,0.02);
      --bg-card: rgba(0, 0, 0, 0.045);
      --bg-search: rgba(0,0,0,0.08);
      --bg-hover: rgba(0,0,0,0.05);
      --bg-hover-strong: rgba(0,0,0,0.1);
      --border-subtle: rgba(0,0,0,0.06);
      --border-card: rgba(0,0,0,0.06);
      --border-input: rgba(0,0,0,0.1);
      --text-primary: #000;
      --text-secondary: #1a1a1a;
      --text-muted: #555;
      --text-placeholder: #999;
      --icon-default: #bbb;
      --icon-strong: #444;
      --icon-hover: #111;
      --dropdown-bg: rgba(255, 255, 255, 0.88);
      --dialog-bg: #fff;
      --dialog-text: #222;
      --overlay-bg: rgba(0,0,0,0.25);
      --tooltip-bg: #fff;
      --tooltip-text: #222;
      --theme-icon: #999;
    }

    .dark-mode {
      --bg-primary: rgba(30, 30, 36, 0.96);
      --bg-titlebar: rgba(26, 26, 32, 0.7);
      --bg-content: rgba(255,255,255,0.04);
      --bg-card: rgba(255, 255, 255, 0.06);
      --bg-search: rgba(255,255,255,0.1);
      --bg-hover: rgba(255,255,255,0.08);
      --bg-hover-strong: rgba(255,255,255,0.12);
      --border-subtle: rgba(255,255,255,0.08);
      --border-card: rgba(255,255,255,0.08);
      --border-input: rgba(255,255,255,0.12);
      --text-primary: #E0E0E0;
      --text-secondary: #ccc;
      --text-muted: #aaa;
      --text-placeholder: #777;
      --icon-default: #888;
      --icon-strong: #bbb;
      --icon-hover: #eee;
      --dropdown-bg: rgba(36, 36, 44, 0.92);
      --dialog-bg: #2a2a32;
      --dialog-text: #ddd;
      --overlay-bg: rgba(0,0,0,0.45);
      --tooltip-bg: #333;
      --tooltip-text: #eee;
      --theme-icon: #aaa;
    }

    /* ===== Dark Mode: card actions, pinned, time-header, empty-state ===== */
    .dark-mode .clip-card.pinned {
      background: rgba(255, 255, 255, 0.16);
      border-color: rgba(255, 255, 255, 0.25);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.35);
      transform: scale(1.025);
    }
    .dark-mode .action-btn svg { fill: #777; }
    .dark-mode .action-btn:hover svg { fill: #eee; }
    .dark-mode .action-btn:hover { background: rgba(255,255,255,0.08); }
    .dark-mode .btn-pin svg { fill: #666; }
    .dark-mode .time-header { color: #ccc; }
    .dark-mode .empty-state { color: #888; }
    .dark-mode .clip-checkbox::before { border-color: rgba(255,255,255,0.35); }
    .dark-mode .clip-checkbox::after { border-color: #ddd; }
    .dark-mode .dropdown-item.active { background: rgba(255,255,255,0.1); }
    .dark-mode .clip-text { color: #ddd; }
    .dark-mode .clip-time { color: #999; }
    .dark-mode .dropdown { border-color: rgba(255,255,255,0.1); }
    .dark-mode .date-selector .dropdown-item { color: #ccc; }
    .dark-mode .date-selector .dropdown-item:hover { background: rgba(255,255,255,0.08); }
    .dark-mode .confirm-dialog .confirm-btn.danger { background: #ef5350; border-color: #ef5350; }
    .dark-mode .clip-checkbox.checked::before { border-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: transparent;
      height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* 主窗口容器 - 玻璃卡片 (更白更雾面) */
    .window {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-radius: 12px;
      background: var(--bg-primary);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.15),
            0 0 0 1px rgba(255, 255, 255, 0.3) inset;
      transform-origin: right bottom;
      transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.2s ease-in-out;
    }

    .window.minimizing {
      transform: scale(0.55) translateY(50px) translateX(25px);
      opacity: 0;
      pointer-events: none;
      transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.25s ease-in-out;
    }


    /* 标题栏 - 玻璃效果 */
    .titlebar {
      height: 42px;
      padding: 0 80px 0 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border-subtle);
      flex-shrink: 0;
      user-select: none;
      cursor: default;
      background: var(--bg-titlebar);
      position: relative;
      z-index: 100;
    }

    /* 窗口控制按钮区域 */
    .window-controls {
      position: absolute;
      right: 12px;
      top: 12px;
      
      display: flex;
      gap: 8px;       /* 稍微拉开一点按键间距，视觉更精致 */
      flex-shrink: 0;
      width: 50px;
      justify-content: flex-end;
      z-index: 101;     /* 确保控制按钮层级正确 */
    }

    /* 圆形控制按钮基类 */
    .control-btn {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      cursor: pointer;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      /* 让按钮本身在缩放时也有平滑的过渡 */
      transition: transform 0.2s cubic-bezier(0.25, 1, 0.5, 1);
    }

    /* 鼠标悬停及点击按键时的微小缩放反馈 */
    .control-btn:hover { transform: scale(1.08); }
    .control-btn:active { transform: scale(0.92); }

    /* 红色：关闭程序 */
    .control-btn.close {
      background: radial-gradient(circle at 30% 30%, #ff7b73, #ff5f57 45%, #c0392b 100%);
      box-shadow: 0 1.5px 3px rgba(0,0,0,0.25), inset 0 1px 1px rgba(255,255,255,0.45), inset 0 -1px 2px rgba(0,0,0,0.2);
    }

    /* 绿色：最小化程序 */
    .control-btn.minimize {
      background: radial-gradient(circle at 30% 30%, #4cd964, #28c840 45%, #1a8c2b 100%);
      box-shadow: 0 1.5px 3px rgba(0,0,0,0.25), inset 0 1px 1px rgba(255,255,255,0.45), inset 0 -1px 2px rgba(0,0,0,0.2);
    }

    /* 图标 SVG 的初始隐藏状态 */
    .control-btn .icon-svg {
      position: absolute;
      width: 8px;
      height: 8px;
      opacity: 0;      /* 默认完全透明隐藏 */
      transform: scale(0.5); /* 默认缩小一半，配合后面做放大淡入动效 */
      /* 核心：使用 cubic-bezier 贝塞尔曲线，能让图标展现出优雅的弹性淡入感 */
      transition: opacity 0.18s ease, transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
      z-index: 10;
    }

    /* 当鼠标悬停在按钮上时，图标变为可见，并恢复 1:1 的正常大小 */
    .control-btn:hover .icon-svg { 
      opacity: 1; 
      transform: scale(1);  /* 从 0.5 平滑放大到 1 */
    }

    /* 图标线条的细节渲染 */
    .control-btn .icon-svg line {
      stroke: rgba(0, 0, 0, 0.55); /* 使用带有透明度的深色，比纯黑更具有高级感 */
      stroke-width: 1.6;      /* 线条粗细控制在 1.6，清晰且精致 */
      stroke-linecap: round;    /* 让线条的两端呈圆润的弧形 */
    }

    /* 日期选择器 */
    .date-selector {
      overflow: visible;
      display: flex;
      align-items: center;
      gap: 4px;
      color: var(--text-primary);
      font-weight: 500;
      font-size: 12px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 5px;
      transition: background 0.15s;
      position: relative;
      flex-shrink: 0;
      width: 70px;
    }
    .date-selector:hover { background: var(--bg-hover); }

    /* 全局置顶图钉按钮 — 与列表内置顶按钮动画一致 */
    .title-pin-btn {
      width: 26px; height: 26px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; border-radius: 6px; flex-shrink: 0;
      -webkit-app-region: no-drag;
      transition: background 0.2s ease;
    }
    .title-pin-btn svg {
      width: 14px; height: 14px; fill: var(--icon-default);
      transition: fill 0.25s, transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .title-pin-btn:hover svg {
      fill: var(--icon-strong);
      transform: scale(1.25);
    }
    .title-pin-btn:hover { background: var(--bg-hover); }
    .title-pin-btn.active {
      background: var(--bg-hover-strong);
    }
    .title-pin-btn.active svg {
      fill: var(--text-primary);
      transform: scale(1.3);
    }
    .date-icon { width: 12px; height: 12px; fill: var(--text-primary); }

    /* 下拉菜单 - iOS/macOS 玻璃浮层 */
    .dropdown {
      position: fixed;
      background: var(--dropdown-bg);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border: 1px solid var(--border-subtle);
      border-radius: 14px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12), 0 2px 8px rgba(0, 0, 0, 0.06);
      min-width: 140px;
      display: flex;
      flex-direction: column;
      padding: 6px;
      z-index: 99999;
      opacity: 0;
      visibility: hidden;
      transform: scale(0.96) translateY(-6px);
      pointer-events: none;
      transform-origin: top left;
      transition: opacity 0.18s cubic-bezier(0.16, 1, 0.3, 1),
            transform 0.2s cubic-bezier(0.16, 1, 0.3, 1),
            visibility 0.18s;
    }
    .dropdown.show {
      opacity: 1;
      visibility: visible;
      transform: scale(1) translateY(0);
      pointer-events: auto;
    }
    .dropdown-item {
      padding: 10px 14px;
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 400;
      border-radius: 10px;
      cursor: pointer;
      background: transparent;
      letter-spacing: -0.01em;
      transition: background 0.15s cubic-bezier(0.16, 1, 0.3, 1),
            transform 0.18s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .dropdown-item:hover {
      background: var(--bg-hover);
      transform: translateX(4px);
    }
    .dropdown-item.active {
      background: var(--bg-hover-strong);
      font-weight: 600;
      color: var(--text-primary);
    }
/* 搜索框 */
    .search-box {
      flex: 1;
      position: relative;
      min-width: 80px;
    }
    .search-input {
      width: 100%;
      height: 26px;
      background: var(--bg-search);
      border: 1px solid var(--border-input);
      border-radius: 13px;
      padding: 0 10px 0 28px;
      color: var(--text-primary);
      font-size: 12px;
      outline: none;
      transition: all 0.2s;
    }
    .search-input::placeholder { color: var(--text-placeholder); }
    .search-input:focus {
      background: var(--bg-hover-strong);
      border-color: rgba(255,255,255,0.2);
    }

    .search-icon {
      position: absolute;
      left: 9px;
      top: 7px;
      width: 12px;
      height: 12px;
      fill: var(--text-muted);
    }

    /* 内容区 */
    .content {
      flex: 1;
      min-height: 200px;
      overflow-y: auto;
      padding: 10px 12px;
      background: var(--bg-content);
    }

    /* Card list wrapper */
    .card-list {
      position: relative;
      transition: padding-left 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .content.edit-mode .card-list {
      padding-left: 56px;
    }

    /* Card row - positions checkbox next to card */
    .card-row {
      position: relative;
    }
    .content::-webkit-scrollbar { width: 5px; }
    .content::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.15);
      border-radius: 3px;
    }

    /* 时间分组 */
    .time-header {
      font-size: 10px;
      color: var(--text-secondary); font-weight: 600;
      font-weight: 500;
      padding: 6px 2px 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* 卡片 - 更白更雾面 */
    .clip-card {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: 10px;
      padding: 10px 12px;
      padding-left: 12px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      position: relative;
      will-change: transform;
      transition: transform 0.35s cubic-bezier(0.2, 0.8, 0.4, 1), box-shadow 0.35s cubic-bezier(0.2, 0.8, 0.4, 1), background 0.35s cubic-bezier(0.2, 0.8, 0.4, 1), opacity 0.25s ease;
      overflow: hidden;
      z-index: 1;
      min-height: 52px;
      height: auto;
    }
    .clip-card:hover {
      background: rgba(0, 0, 0, 0.07);
      border-color: rgba(0,0,0,0.1);
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
      z-index: 50;
      transform: translateY(-4px) scale(1.01);
    }
    .clip-card.pinned { background: rgba(0, 0, 0, 0.14); border-color: rgba(0, 0, 0, 0.22); box-shadow: 0 4px 20px rgba(0, 0, 0, 0.14); transform: scale(1.025); padding: 12px 14px; max-height: 60px; }
    .clip-card.pinned .btn-pin svg { fill: var(--text-primary); transform: scale(1.3); transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1); }

    .clip-text {
      font-size: 12px;
      color: #000;
      line-height: 1.5;
      flex: 1;
      margin-right: 70px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      word-break: break-word;
      transition: opacity 0.45s cubic-bezier(0.25, 1, 0.5, 1), line-height 0.45s cubic-bezier(0.25, 1, 0.5, 1);
      opacity: 0.9;
    }
    .clip-card:hover .clip-text {
      -webkit-line-clamp: unset;
      overflow: visible;
      opacity: 1;
      line-height: 1.65;
    }

    .clip-card .card-actions {
      transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      transform: translateY(0);
    }
    .clip-card:hover .card-actions {
      transform: translateY(2px);
    }

    .card-actions {
      position: absolute;
      right: 8px;
      display: flex;
      gap: 2px;
      opacity: 0.5;
      transition: opacity 0.15s;
    }
    .clip-card:hover .card-actions { opacity: 1; }

    .action-btn {
      background: none;
      border: none;
      padding: 4px;
      cursor: pointer;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .action-btn:hover { background: rgba(0,0,0,0.05); }
    .action-btn svg { width: 13px; height: 13px; fill: #333; transition: fill 0.25s, transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1); } .btn-pin svg { fill: #bbb; }
    .action-btn:hover svg { fill: #000; }

    /* 复制按钮勾号动画 - Apple 风格过渡 */
    .btn-copy svg .copy-doc {
      transition: opacity 0.25s cubic-bezier(0.22, 1, 0.36, 1), transform 0.25s cubic-bezier(0.22, 1, 0.36, 1);
      transform-origin: center center;
    }
    .btn-copy svg .copy-check {
      fill: none;
      stroke: #555;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 20;
      stroke-dashoffset: 20;
      opacity: 0;
      transform: scale(0.5);
      transition: stroke-dashoffset 0.35s cubic-bezier(0.22, 1, 0.36, 1) 0.1s, opacity 0.2s cubic-bezier(0.22, 1, 0.36, 1), transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) 0.05s;
      transform-origin: center center;
    }
    .btn-copy.copied svg .copy-doc {
      opacity: 0;
      transform: scale(0.5) rotate(-8deg);
    }
    .btn-copy.copied svg .copy-check {
      stroke-dashoffset: 0;
      opacity: 1;
      transform: scale(1);
    }
    .dark-mode .btn-copy svg .copy-check {
      stroke: #aaa;
    }

    /* ===== 内容类型胶囊标签 ===== */
    .type-tag {
      position: absolute;
      top: 6px;
      left: 8px;
      font-size: 9px;
      font-weight: 600;
      padding: 1px 7px;
      border-radius: 10px;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      pointer-events: none;
      z-index: 5;
      opacity: 0.85;
      transition: opacity 0.2s;
    }
    /* 有 type-tag 时文字右移避让 */
    .clip-card:has(.type-tag:not(.text)) .clip-text {
      margin-left: 40px;
    }
    .clip-card:hover .type-tag { opacity: 1; }
    /* 统一中性色标签 */
    .type-tag.code,
    .type-tag.link,
    .type-tag.email,
    .type-tag.phone,
    .type-tag.number {
      background: rgba(0,0,0,0.05);
      color: #888;
      border: 1px solid rgba(0,0,0,0.08);
    }
    .type-tag.text    { display: none; }
    /* 暗色模式适配 */
    .dark-mode .type-tag.code,
    .dark-mode .type-tag.link,
    .dark-mode .type-tag.email,
    .dark-mode .type-tag.phone,
    .dark-mode .type-tag.number {
      background: rgba(255,255,255,0.07);
      color: #999;
      border: 1px solid rgba(255,255,255,0.1);
    }


    .empty-state {
      text-align: center;
      color: #555;
      font-size: 12px;
      padding: 40px 0;
      display: none;
    }

    /* ===== 多选编辑模式 ===== */

    /* 标题栏操作区 */
    .edit-actions {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
      position: relative;
    }


    /* 多选开关按钮 */
    .multi-select-btn {
      background: none;
      border: 1px solid rgba(0,0,0,0.12);
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 12px;
      color: #555;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      flex-shrink: 0;
      white-space: nowrap;
    }
    .multi-select-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
    .multi-select-btn.active { background: var(--bg-hover-strong); border-color: var(--border-input); color: var(--text-primary); }
    .multi-select-btn svg { width: 14px; height: 14px; fill: var(--icon-strong); transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .multi-select-btn:hover svg { fill: var(--icon-hover); }
    .multi-select-btn .icon-list { display: block; }
    .multi-select-btn .icon-chevron-down { display: none; }
    .multi-select-btn.active .icon-list { display: none; }
    .multi-select-btn.active .icon-chevron-down { display: block; transform: rotate(180deg); }
    /* ===== 批处理下拉菜单 ===== */
    .batch-dropdown {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      display: flex;
      gap: 4px;
      padding: 6px 8px;
      background: var(--dropdown-bg);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border: 1px solid var(--border-subtle);
      border-radius: 10px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12), 0 2px 8px rgba(0, 0, 0, 0.06);
      opacity: 0;
      visibility: hidden;
      transform: translateY(-4px) scale(0.96);
      pointer-events: none;
      z-index: 9999;
      transform-origin: top left;
      transition: opacity 0.18s cubic-bezier(0.16, 1, 0.3, 1),
                  transform 0.2s cubic-bezier(0.16, 1, 0.3, 1),
                  visibility 0.18s;
    }
    .batch-dropdown.show {
      opacity: 1;
      visibility: visible;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }


    /* 批量操作按钮 - 默认隐藏，编辑模式弹出 */
    .batch-icon-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      background: none;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      width: 28px;
      height: 28px;
      padding: 0;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      -webkit-app-region: no-drag;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .batch-icon-btn:hover {
      background: var(--bg-hover);
      transform: scale(1.05);
    }

    .batch-icon-btn:active { transform: scale(0.95); }
    .batch-icon-btn svg { width: 14px; height: 14px; fill: var(--icon-strong); transition: fill 0.2s; flex-shrink: 0; }
    .batch-icon-btn:hover svg { fill: var(--icon-hover); }
    .batch-icon-btn.danger:hover svg { fill: #c62828; }

    /* ===== 批量操作按钮 ===== */
    .theme-toggle {
      width: 26px; height: 26px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; border-radius: 6px; flex-shrink: 0;
      -webkit-app-region: no-drag;
      transition: background 0.25s cubic-bezier(0.4, 0, 0.2, 1),
                  transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      margin-left: auto;
      margin-right: 16px;
    }
    .theme-toggle:hover {
      background: var(--bg-hover);
      transform: scale(1.1);
    }
    .theme-toggle:active {
      transform: scale(0.92);
    }
    .theme-toggle .theme-icon {
      position: absolute;
      width: 16px;
      height: 16px;
      transition: opacity 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                  transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      stroke: var(--theme-icon);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }
    .theme-toggle .theme-icon.sun {
      opacity: 1;
      transform: rotate(0deg) scale(1);
    }
    .theme-toggle .theme-icon.moon {
      opacity: 0;
      transform: rotate(-90deg) scale(0.5);
    }
    .dark-mode .theme-toggle .theme-icon.sun {
      opacity: 0;
      transform: rotate(90deg) scale(0.5);
    }
    .dark-mode .theme-toggle .theme-icon.moon {
      opacity: 1;
      transform: rotate(0deg) scale(1);
    }
    .dark-mode .theme-toggle:hover {
      background: var(--bg-hover);
    }


    /* ===== 复选框 - 独立定位在卡片左侧留白区 ===== */
    .clip-checkbox {
      display: none;
      position: absolute;
      left: -48px;
      top: 10px;
      width: 22px;
      height: 22px;
      cursor: pointer;
      z-index: 2;
    }
    .content.edit-mode .clip-checkbox { display: block; }

    /* 矩形边框 */
    .clip-checkbox::before {
      content: "";
      position: absolute;
      inset: 0;
      border: 1.8px solid rgba(0,0,0,0.25);
      border-radius: 6px;
      background: transparent;
      opacity: 0.7;
      transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .clip-checkbox:hover::before {
      transform: scale(1.12);
      border-color: rgba(0,0,0,0.5);
      opacity: 1;
    }
    .clip-checkbox:active::before { transform: scale(0.95); }

    /* 选中: 边框淡出，背景保持透明 */
    .clip-checkbox.checked::before {
      background: transparent;
      border-color: transparent;
      opacity: 1;
      animation: cbPop 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes cbPop {
      0%  { transform: scale(1); border-radius: 6px; }
      40% { transform: scale(1.22); border-radius: 6px; }
      70% { transform: scale(1.05); border-radius: 8px; }
      100% { transform: scale(1); border-radius: 8px; }
    }

    /* 对勾 - scale(0)→scale(1) 弹性动画 */
    /* 黑色对勾 - scale(0) elastic to scale(1) */
    .clip-checkbox::after {
      content: "";
      position: absolute;
      top: 3px;
      left: 7px;
      width: 7px;
      height: 12px;
      border: solid #1a1a1a;
      border-width: 0 2.2px 2.2px 0;
      transform: rotate(45deg) scale(0);
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .clip-checkbox.checked::after {
      opacity: 1;
      transform: rotate(45deg) scale(1);
    }

    /* 取消选中: 边框恢复 + 对勾缩小 */
    .clip-checkbox.unchecking::before {
      background: transparent !important;
      border-color: rgba(0,0,0,0.25) !important;
      border-radius: 6px !important;
      opacity: 0.7 !important;
      animation: none !important;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .clip-checkbox.unchecking::after {
      opacity: 0;
      transform: rotate(45deg) scale(0);
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }


    /* ===== 编辑模式卡片样式 ===== */
    .content.edit-mode .clip-card {
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.2, 0.8, 0.4, 1);
    }
    .content.edit-mode .clip-card.selected {
      background: var(--bg-hover-strong);
      border-color: var(--border-input);
    }
    .content.edit-mode .clip-card:hover {
      transform: none;
      background: var(--bg-hover);
    }
    .content.edit-mode .clip-card.selected:hover {
      background: var(--bg-hover-strong);
    }
    .content.edit-mode .card-actions {
      pointer-events: none;
      opacity: 0.25;
    }

    /* 卡片删除/置顶反馈动画 */
    .clip-card.removing {
      opacity: 0;
      transform: scale(0.92) translateX(16px);
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
    }
    .clip-card.pinning {
      transform: scale(1.03);
      transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* FLIP 动画：卡片行平滑位移（GPU 合成层，translateY 不触发 layout） */
    .card-row.flip-moving {
      transition: transform 0.45s cubic-bezier(0.25, 0.1, 0.25, 1);
    }
    /* 被置顶/取消置顶的目标卡片：带弹性着陆 */
    .card-row.flip-target {
      transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .card-row.flip-target .clip-card {
      transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .card-row.flip-target .clip-card.flip-landing {
      transform: scale(1.06);
    }




    /* ===== 确认弹窗 ===== */
    .confirm-overlay {
      position: fixed;
      inset: 0;
      background: var(--overlay-bg);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    .confirm-overlay.show { display: flex; }
    .confirm-dialog {
      background: var(--dialog-bg);
      border-radius: 12px;
      padding: 16px 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.18);
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 13px;
      color: var(--dialog-text);
      max-width: 340px;
      animation: dialogIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    

    /* ===== 快捷粘贴闪烁动画 ===== */
    /* 点击复制时的边框发光动画（白光） */
    @keyframes borderGlow {
      0%   { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); border-color: var(--border-card); }
      30%  { box-shadow: 0 0 8px 3px rgba(255, 255, 255, 0.5), inset 0 0 6px 2px rgba(255, 255, 255, 0.15); border-color: rgba(255, 255, 255, 0.7); }
      100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); border-color: var(--border-card); }
    }
    .clip-card.paste-flash {
      animation: borderGlow 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes dialogIn {
      from { opacity: 0; transform: scale(0.9) translateY(-10px); }
      to  { opacity: 1; transform: scale(1) translateY(0); }
    }
    .confirm-dialog .confirm-text {
      flex: 1;
      font-weight: 500;
    }
    .confirm-dialog .confirm-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    .confirm-dialog .confirm-btn {
      background: none;
      border: 1px solid var(--border-input);
      border-radius: 6px;
      padding: 5px 14px;
      font-size: 12px;
      cursor: pointer;
      color: var(--text-muted);
      transition: all 0.2s;
    }
    .confirm-dialog .confirm-btn:hover { background: var(--bg-hover); }
    .confirm-dialog .confirm-btn.danger {
      background: #c62828;
      color: #fff;
      border-color: #c62828;
    }
    .confirm-dialog .confirm-btn.danger:hover { background: #b71c1c; }

  
        /* ===== Tooltip ===== */
        .custom-tooltip {
            position: fixed;
            background: var(--tooltip-bg);
            color: var(--tooltip-text);
            font-size: 11px;
            padding: 5px 10px;
            border-radius: 6px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
            pointer-events: none;
            z-index: 10000;
            opacity: 0;
            transform: translateY(4px);
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            white-space: nowrap;
        }
        .custom-tooltip.show {
            opacity: 1;
            transform: translateY(0);
        }
  </style>
</head>
<body>

    <div class="content" id="content"></div>
    <div class="empty-state" id="emptyState">没有找到记录</div>

  <div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-dialog">
      <span class="confirm-text" id="confirmText"></span>
      <div class="confirm-actions">
        <button class="confirm-btn" id="confirmCancelBtn" data-i18n="confirm_cancel">取消</button>
        <button class="confirm-btn danger" id="confirmOkBtn" data-i18n="confirm_ok">确认</button>
      </div>
    </div>
  </div>

  <script>

    // ============ i18n 前端语言包（与 main.js 同步） ============

    const locales = {

      "zh-CN": {

        date_all: "全部", date_today: "今天", date_yesterday: "昨天",

        date_daybefore: "前天", date_3day: "更早前", date_older: "更早",

        search_placeholder: "搜索...",

        empty_state: "没有找到记录",

        confirm_text: "确定要删除选中的剪贴记录吗？此操作不可恢复。",

        confirm_cancel: "取消", confirm_ok: "确认",

        tooltip_multiselect: "多选", tooltip_batch_pin: "一键置顶选中",

        tooltip_batch_delete: "删除已选项", tooltip_pin_window: "窗口置顶",

        tooltip_minimize: "最小化", tooltip_close: "关闭",

        tooltip_theme: "切换深色模式", tooltip_pin: "置顶",

        tooltip_copy: "复制", tooltip_delete: "删除",

        pinned_header: "置顶"

      },

      "zh-TW": {

        date_all: "全部", date_today: "今天", date_yesterday: "昨天",

        date_daybefore: "前天", date_3day: "更早前", date_older: "更早",

        search_placeholder: "搜尋...",

        empty_state: "沒有找到記錄",

        confirm_text: "確定要刪除選中的剪貼記錄嗎？此操作不可恢復。",

        confirm_cancel: "取消", confirm_ok: "確認",

        tooltip_multiselect: "多選", tooltip_batch_pin: "一鍵置頂選中",

        tooltip_batch_delete: "刪除已選項", tooltip_pin_window: "視窗置頂",

        tooltip_minimize: "最小化", tooltip_close: "關閉",

        tooltip_theme: "切換深色模式", tooltip_pin: "置頂",

        tooltip_copy: "複製", tooltip_delete: "刪除",

        pinned_header: "置頂"

      },

      "ja-JP": {

        date_all: "すべて", date_today: "今日", date_yesterday: "昨日",

        date_daybefore: "一昨日", date_3day: "以前", date_older: "以前",

        search_placeholder: "検索...",

        empty_state: "記録が見つかりません",

        confirm_text: "選択したクリップを削除してもよろしいですか？この操作は元に戻せません。",

        confirm_cancel: "キャンセル", confirm_ok: "削除",

        tooltip_multiselect: "複数選択", tooltip_batch_pin: "選択をピン留め",

        tooltip_batch_delete: "選択を削除", tooltip_pin_window: "最前面に表示",

        tooltip_minimize: "最小化", tooltip_close: "閉じる",

        tooltip_theme: "ダークモード切替", tooltip_pin: "ピン留め",

        tooltip_copy: "コピー", tooltip_delete: "削除",

        pinned_header: "ピン留め"

      },

      "en-US": {

        date_all: "All", date_today: "Today", date_yesterday: "Yesterday",

        date_daybefore: "2 Days Ago", date_3day: "Earlier", date_older: "Older",

        search_placeholder: "Search...",

        empty_state: "No records found",

        confirm_text: "Are you sure you want to delete the selected clips? This cannot be undone.",

        confirm_cancel: "Cancel", confirm_ok: "Delete",

        tooltip_multiselect: "Multi-select", tooltip_batch_pin: "Pin Selected",

        tooltip_batch_delete: "Delete Selected", tooltip_pin_window: "Always on Top",

        tooltip_minimize: "Minimize", tooltip_close: "Close",

        tooltip_theme: "Toggle Dark Mode", tooltip_pin: "Pin",

        tooltip_copy: "Copy", tooltip_delete: "Delete",

        pinned_header: "Pinned"

      }

    };



    let currentLang = "zh-CN";

    function t(key) {

      const dict = locales[currentLang] || locales["en-US"];

      return dict[key] || (locales["en-US"][key] || key);

    }



    // 动态日期标签（由 applyLanguage 填充）

    const dateLabels = { all: "", today: "", yesterday: "", daybefore: "", "3day": "", older: "" };



    // 将当前语言应用到所有 UI 元素

    function applyLanguage(lang) {

      currentLang = lang || currentLang;

      localStorage.setItem("clippin-lang", currentLang);



      const si = document.getElementById("searchInput");

      if (si) si.placeholder = t("search_placeholder");



      if (dateText) {

        const activeItem = document.querySelector("#dropdown .dropdown-item.active");

        if (activeItem) {

          dateText.textContent = t("date_" + activeItem.getAttribute("data-value"));

        } else {

          dateText.textContent = t("date_all");

        }

      }



      dateLabels.all = t("date_all");

      dateLabels.today = t("date_today");

      dateLabels.yesterday = t("date_yesterday");

      dateLabels.daybefore = t("date_daybefore");

      dateLabels["3day"] = t("date_3day");

      dateLabels.older = t("date_older");



      const dd = document.getElementById("dropdown");

      if (dd) {

        const items = dd.querySelectorAll(".dropdown-item");

        const keys = ["all", "today", "yesterday", "daybefore", "3day"];

        items.forEach((item, i) => {

          if (i < keys.length) item.textContent = t("date_" + keys[i]);

        });

      }



      const es = document.getElementById("emptyState");

      if (es) es.textContent = t("empty_state");



      const cancelBtn = document.getElementById("confirmCancelBtn");

      const okBtn = document.getElementById("confirmOkBtn");

      if (cancelBtn) cancelBtn.textContent = t("confirm_cancel");

      if (okBtn) okBtn.textContent = t("confirm_ok");



      fetchClips();

    }



    function getTooltipLabels() {

      return {

        "multiSelectBtn": t("tooltip_multiselect"),

        "batchPinBtn": t("tooltip_batch_pin"),

        "batchClearUnpinnedBtn": t("tooltip_batch_delete"),

        "pinBtn": t("tooltip_pin_window"),

        "minimizeBtn": t("tooltip_minimize"),

        "closeBtn": t("tooltip_close"),

        "themeToggle": t("tooltip_theme"),

        "btn-pin": t("tooltip_pin"),

        "btn-copy": t("tooltip_copy"),

        "btn-delete": t("tooltip_delete")

      };

    }



    if (window.electronAPI && window.electronAPI.onLanguageChanged) {

      window.electronAPI.onLanguageChanged((code) => { applyLanguage(code); });

    }
    let data = [];
    let currentFilter = 'all';
    let currentSearch = '';

    const content = document.getElementById('content');
    const searchInput = document.getElementById('searchInput');
    const dateSelector = document.getElementById('dateSelector');
    const dropdown = document.getElementById('dropdown');
    const dateText = document.getElementById('dateText');


    // 日期选择
    dateSelector.addEventListener('click', e => {
      e.stopPropagation();
      const rect = dateSelector.getBoundingClientRect();
      dropdown.style.left = rect.left + 'px';
      dropdown.style.top = (rect.bottom + 4) + 'px';
      dropdown.classList.toggle('show');
    });
    dropdown.addEventListener('click', e => e.stopPropagation());
    document.addEventListener('click', () => dropdown.classList.remove('show'));
    document.addEventListener('keydown', e => { if (e.key === 'Escape') dropdown.classList.remove('show'); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape' && isEditMode) { isEditMode = false; selectedIds.clear(); document.getElementById('batchDropdown').classList.remove('show'); updateEditUI(); } });

    dropdown.querySelectorAll('.dropdown-item').forEach(item => {
      item.addEventListener('click', (e) => {
          e.stopPropagation();
        dropdown.querySelectorAll('.dropdown-item').forEach(i => i.classList.remove('active'));
        item.classList.add('active');
        currentFilter = item.dataset.value;
        dateText.textContent = dateLabels[currentFilter];
        fetchClips();
      });
    });

    // 搜索
    searchInput.addEventListener('input', e => {
      currentSearch = e.target.value.toLowerCase();
      fetchClips();
    });

    // 获取数据
    async function fetchClips() {
      try {
        const json = await window.electronAPI.listClips({
          sort: 'pinned-first',
          date: currentFilter,
          search: currentSearch
        });
        data = json.data || [];
      } catch (e) {
        data = [];
      }
      render();
    }

    // 渲染
    function render() {
      let filtered = [...data];

      if (filtered.length === 0) {
        content.innerHTML = '';
        document.getElementById('emptyState').style.display = 'block';
        return;
      }
      document.getElementById('emptyState').style.display = 'none';

      // 分离置顶项和非置顶项，置顶内容始终置于所有日期分组之前
      const pinnedItems = filtered.filter(item => item.pinned);
      const unpinnedItems = filtered.filter(item => !item.pinned);

      const groups = {};
      unpinnedItems.forEach(item => {
        if (!groups[item.dateGroup]) groups[item.dateGroup] = [];
        groups[item.dateGroup].push(item);
      });

      const order = ['today', 'yesterday', 'daybefore', '3day', 'older'];
      let html = '<div class="card-list">';

      // 先渲染所有置顶项（不区分日期，统一直顶）

            + '<button class="action-btn btn-copy">'

      // 再按日期分组渲染非置顶项
      order.forEach(g => {
        if (!groups[g]) return;
        html += '<div class="time-header">' + (dateLabels[g] || t('date_' + g) || g) + '</div>';
        groups[g].forEach(item => {
          html += '<div class="card-row" data-id="' + item.id + '">'

            + '<div class="card-actions">'
            + '<button class="action-btn btn-pin">'
            + '<svg viewBox="0 0 24 24"><path d="M16 12V4h1V2H7v2h1v8l-2 2v2h5.2v6h1.6v-6H18v-2l-2-2z"/></svg>'
            + '</button>'
            + '<button class="action-btn btn-copy">'
            + '<svg viewBox="0 0 24 24"><path class="copy-doc" d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/><polyline class="copy-check" points="8 13 11 16 17 9"/></svg>'
            + '</button>'
            + '<button class="action-btn btn-delete">'
            + '<svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>'
            + '</button>'
            + '</div></div>'
            + '</div>';
        });
      });
      html += '</div>';

      content.innerHTML = html;

    }

      // ===== 事件委托：置顶/复制/删除 + 点击卡片 =====
      content.addEventListener('click', (e) => {
        if (isEditMode) return;
        const card = e.target.closest('.clip-card');
        if (!card) return;
        const row = card.closest('.card-row');
        if (!row) return;
        const id = parseInt(row.dataset.id);
        if (isNaN(id)) return;
        const item = data.find(d => d.id === id);
        if (!item) return;

        // 点击置顶按钮
        if (e.target.closest('.btn-pin')) {
          const oldPos = new Map();
          document.querySelectorAll('.card-row').forEach(row => {
            oldPos.set(row.dataset.id, row.getBoundingClientRect().top);
          });
          const svg = card.querySelector('.btn-pin svg');
          svg.style.transform = 'scale(1.35)';
          setTimeout(() => { svg.style.transform = ''; }, 250);
          window.electronAPI.togglePin(id).then(() => fetchClips()).then(() => {
            requestAnimationFrame(() => {
              const rows = document.querySelectorAll('.card-row');
              const newPos = new Map();
              rows.forEach(row => {
                newPos.set(row.dataset.id, row.getBoundingClientRect().top);
              });
              let targetRow = null;
              rows.forEach(row => {
                const rid = row.dataset.id;
                const oY = oldPos.get(rid);
                const nY = newPos.get(rid);
                if (oY === undefined || nY === undefined) return;
                const delta = oY - nY;
                if (Math.abs(delta) < 1) return;
                row.style.transition = 'none';
                row.style.transform = 'translateY(' + delta + 'px)';
                if (rid === String(id)) {
                  targetRow = row;
                  const clipCard = row.querySelector('.clip-card');
                  if (clipCard) {
                    clipCard.style.transition = 'none';
                    clipCard.style.transform = 'scale(1.06)';
                  }
                }
              });
              requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                  document.querySelectorAll('.card-row').forEach(row => {
                    const rid = row.dataset.id;
                    if (rid === String(id)) {
                      row.classList.add('flip-target');
                      const cc = row.querySelector('.clip-card');
                      if (cc) {
                        cc.classList.add('flip-landing');
                        cc.style.transition = '';
                      }
                    } else {
                      row.classList.add('flip-moving');
                    }
                    row.style.transition = '';
                    row.style.transform = '';
                  });
                  setTimeout(() => {
                    document.querySelectorAll('.card-row').forEach(row => {
                      row.style.transform = '';
                      row.style.transition = '';
                      row.classList.remove('flip-moving', 'flip-target');
                      const cc = row.querySelector('.clip-card');
                      if (cc) {
                        cc.style.transform = '';
                        cc.style.transition = '';
                        cc.classList.remove('flip-landing');
                      }
                    });
                  }, 550);
                });
              });
            });
          });
          return;
        }

        // 点击复制按钮
        if (e.target.closest('.btn-copy')) {
          const oldPos = new Map();
          document.querySelectorAll('.card-row').forEach(row => {
            oldPos.set(row.dataset.id, row.getBoundingClientRect().top);
          });
          window.electronAPI.copyToClipboard(id);
          fetchClips().then(() => {
            // DOM 重建后重新找到该按钮并触发勾号动画
            const newRow = document.querySelector('.card-row[data-id="' + id + '"]');
            if (newRow) {
              const newBtn = newRow.querySelector('.btn-copy');
              if (newBtn) {
                newBtn.classList.add('copied');
                setTimeout(() => newBtn.classList.remove('copied'), 1200);
              }
            }
            requestAnimationFrame(() => {
              const rows = document.querySelectorAll('.card-row');
              const newPos = new Map();
              rows.forEach(row => {
                newPos.set(row.dataset.id, row.getBoundingClientRect().top);
              });
              rows.forEach(row => {
                const rid = row.dataset.id;
                const oY = oldPos.get(rid);
                const nY = newPos.get(rid);
                if (oY === undefined || nY === undefined) return;
                const delta = oY - nY;
                if (Math.abs(delta) < 1) return;
                row.style.transition = 'none';
                row.style.transform = 'translateY(' + delta + 'px)';
                if (rid === String(id)) {
                  const clipCard = row.querySelector('.clip-card');
                  if (clipCard) {
                    clipCard.style.transition = 'none';
                    clipCard.style.transform = 'scale(1.04)';
                  }
                }
              });
              requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                  document.querySelectorAll('.card-row').forEach(row => {
                    if (row.dataset.id === String(id)) {
                      row.classList.add('flip-target');
                      const cc = row.querySelector('.clip-card');
                      if (cc) {
                        cc.classList.add('flip-landing');
                        cc.style.transition = '';
                      }
                    } else {
                      row.classList.add('flip-moving');
                    }
                    row.style.transition = '';
                    row.style.transform = '';
                  });
                  setTimeout(() => {
                    document.querySelectorAll('.card-row').forEach(row => {
                      row.style.transform = '';
                      row.style.transition = '';
                      row.classList.remove('flip-moving', 'flip-target');
                      const cc = row.querySelector('.clip-card');
                      if (cc) {
                        cc.style.transform = '';
                        cc.style.transition = '';
                        cc.classList.remove('flip-landing');
                      }
                    });
                  }, 550);
                });
              });
            });
          });
          return;
        }

        // 点击删除按钮
        if (e.target.closest('.btn-delete')) {
          card.style.opacity = '0';
          card.style.transform = 'translateX(20px)';
          window.electronAPI.deleteClip(id);
          setTimeout(() => fetchClips(), 200);
          return;
        }

        // ?????
        if (e.target.closest('.clip-checkbox')) return;

        // 点击类型标签
        if (e.target.closest('.type-tag')) return;

        // 点击卡片空白区域 → 复制 + FLIP 动画
        const oldPos = new Map();
        document.querySelectorAll('.card-row').forEach(row => {
          oldPos.set(row.dataset.id, row.getBoundingClientRect().top);
        });
        window.electronAPI.copyToClipboard(id);
        fetchClips().then(() => {
          // DOM 重建后触发勾号动画
          const newRow = document.querySelector('.card-row[data-id="' + id + '"]');
          if (newRow) {
            const newBtn = newRow.querySelector('.btn-copy');
            if (newBtn) {
              newBtn.classList.add('copied');
              setTimeout(() => newBtn.classList.remove('copied'), 1200);
            }
          }
          requestAnimationFrame(() => {
            const rows = document.querySelectorAll('.card-row');
            const newPos = new Map();
            rows.forEach(row => {
              newPos.set(row.dataset.id, row.getBoundingClientRect().top);
            });
            rows.forEach(row => {
              const rid = row.dataset.id;
              const oY = oldPos.get(rid);
              const nY = newPos.get(rid);
              if (oY === undefined || nY === undefined) return;
              const delta = oY - nY;
              if (Math.abs(delta) < 1) return;
              row.style.transition = 'none';
              row.style.transform = 'translateY(' + delta + 'px)';
              if (rid === String(id)) {
                const clipCard = row.querySelector('.clip-card');
                if (clipCard) {
                  clipCard.style.transition = 'none';
                  clipCard.style.transform = 'scale(1.04)';
                }
              }
            });
            requestAnimationFrame(() => {
              requestAnimationFrame(() => {
                document.querySelectorAll('.card-row').forEach(row => {
                  if (row.dataset.id === String(id)) {
                    row.classList.add('flip-target');
                    const cc = row.querySelector('.clip-card');
                    if (cc) {
                      cc.classList.add('flip-landing');
                      cc.style.transition = '';
                    }
                  } else {
                    row.classList.add('flip-moving');
                  }
                  row.style.transition = '';
                  row.style.transform = '';
                });
                setTimeout(() => {
                  document.querySelectorAll('.card-row').forEach(row => {
                    row.style.transform = '';
                    row.style.transition = '';
                    row.classList.remove('flip-moving', 'flip-target');

                    if (cc) {
                      cc.style.transform = '';

              });

      });

      // Multi-select edit mode
      let isEditMode = false;
      let selectedIds = new Set();

      function updateEditUI() {
        const content = document.getElementById("content");
        const editActions = document.getElementById("editActions");
        const multiSelectBtn = document.getElementById("multiSelectBtn");
        const batchPinBtn = document.getElementById("batchPinBtn");
        const batchClearBtn = document.getElementById("batchClearUnpinnedBtn");

        if (isEditMode) {
          /* Enter edit mode */
          content.classList.add("edit-mode");
          multiSelectBtn.classList.add("active");
          editActions.classList.add("edit-mode");
        } else {
          /* Exit edit mode */
          content.classList.remove("edit-mode");
          multiSelectBtn.classList.remove("active");
          editActions.classList.remove("edit-mode");
          selectedIds.clear();
          /* Clear all checkboxes and selections */
          content.querySelectorAll(".clip-checkbox").forEach(cb => {
            cb.classList.remove("checked", "unchecking");
          });
          content.querySelectorAll(".card-row").forEach(r => {
            r.querySelector(".clip-card")?.classList.remove("selected", "removing", "pinning");
          });
        }
      }

      /* Toggle: click to enter/exit multi-select mode */
      document.getElementById("multiSelectBtn").addEventListener("click", (e) => {
        e.stopPropagation();
        const dropdown = document.getElementById("batchDropdown");
        if (isEditMode) {
          /* Exit edit mode */
          isEditMode = false;
          selectedIds.clear();
          dropdown.classList.remove("show");
          updateEditUI();
        } else {
          /* Enter edit mode */
          isEditMode = true;
          selectedIds.clear();
          dropdown.classList.add("show");
          updateEditUI();
        }
      });

      /* Click titlebar outside edit-actions to close batch dropdown */
      document.addEventListener("click", (e) => {
        const titlebar = document.getElementById("titlebar");
        const editActions = document.getElementById("editActions");
        const dropdown = document.getElementById("batchDropdown");
        if (isEditMode && titlebar.contains(e.target) && !editActions.contains(e.target)) {
          isEditMode = false;
          selectedIds.clear();
          dropdown.classList.remove("show");
          updateEditUI();
        }
      });

      /* Click card body to select/deselect */
      document.getElementById("content").addEventListener("click", (e) => {
        if (!isEditMode) return;
        const card = e.target.closest(".clip-card");
        if (!card) return;
        if (e.target.closest(".action-btn") || e.target.closest(".clip-checkbox")) return;
        const row = card.closest(".card-row");
        const id = parseInt(row.dataset.id);
        const checkbox = row.querySelector(".clip-checkbox");

        if (selectedIds.has(id)) {
          /* Deselect */
          selectedIds.delete(id);
          card.classList.remove("selected");
          checkbox.classList.add("unchecking");
          checkbox.classList.remove("checked");
          setTimeout(function() { checkbox.classList.remove("unchecking"); }, 250);
        } else {
          /* Select with morph animation */
          selectedIds.add(id);
          card.classList.add("selected");
          checkbox.classList.remove("unchecking");
          checkbox.classList.remove("checked");
          void checkbox.offsetWidth;
          checkbox.classList.add("checked");
        }
      });

      /* Click checkbox directly to toggle */
      document.getElementById("content").addEventListener("click", (e) => {
        if (!isEditMode) return;
        const cb = e.target.closest(".clip-checkbox");
        if (!cb) return;
        const row = cb.closest(".card-row");
        const id = parseInt(row.dataset.id);
        const card = row.querySelector(".clip-card");

        if (selectedIds.has(id)) {
          selectedIds.delete(id);
          card.classList.remove("selected");
          cb.classList.add("unchecking");
          cb.classList.remove("checked");
          setTimeout(function() { cb.classList.remove("unchecking"); }, 250);
        } else {
          selectedIds.add(id);
          card.classList.add("selected");
          cb.classList.remove("unchecking");
          cb.classList.remove("checked");
          void cb.offsetWidth;
          cb.classList.add("checked");
        }
      });

      /* Batch pin: FLIP 动画版 — 快照所有卡片位置后批量置顶，播放位移动画 */
      document.getElementById("batchPinBtn").addEventListener("click", (e) => {
        e.stopPropagation();
        if (selectedIds.size === 0) return;

        // Step 1: 记录所有卡片当前 Y 坐标
        const oldPos = new Map();
        document.querySelectorAll('.card-row').forEach(row => {
          oldPos.set(row.dataset.id, row.getBoundingClientRect().top);
        });
        const targetIds = new Set(selectedIds);

        window.electronAPI.batchTogglePin(Array.from(selectedIds)).then(function() {
          isEditMode = false;
          selectedIds.clear();
          document.getElementById('batchDropdown').classList.remove('show');
          updateEditUI();
          return fetchClips();
        }).then(() => {
          // Step 3 + 4: 记录新位置 → 反向定位
          requestAnimationFrame(() => {
            const rows = document.querySelectorAll('.card-row');
            const newPos = new Map();
            rows.forEach(row => {
              newPos.set(row.dataset.id, row.getBoundingClientRect().top);
            });

            rows.forEach(row => {
              const rid = row.dataset.id;
              const oY = oldPos.get(rid);
              const nY = newPos.get(rid);
              if (oY === undefined || nY === undefined) return;
              const delta = oY - nY;
              if (Math.abs(delta) < 1) return;

              row.style.transition = 'none';
              row.style.transform = 'translateY(' + delta + 'px)';

              if (targetIds.has(rid)) {
                const clipCard = row.querySelector('.clip-card');
                if (clipCard) {
                  clipCard.style.transition = 'none';
                  clipCard.style.transform = 'scale(1.06)';
                }
              }
            });

            // Step 5: 播放动画
            requestAnimationFrame(() => {
              requestAnimationFrame(() => {
                document.querySelectorAll('.card-row').forEach(row => {
                  const rid = row.dataset.id;
                  if (targetIds.has(rid)) {
                    row.classList.add('flip-target');
                    const cc = row.querySelector('.clip-card');
                    if (cc) {
                      cc.classList.add('flip-landing');
                      cc.style.transition = '';
                    }
                  } else {
                    row.classList.add('flip-moving');
                  }
                  row.style.transition = '';
                  row.style.transform = '';
                });

                setTimeout(() => {
                  document.querySelectorAll('.card-row').forEach(row => {
                    row.style.transform = '';
                    row.style.transition = '';
                    row.classList.remove('flip-moving', 'flip-target');
                    const cc = row.querySelector('.clip-card');
                    if (cc) {
                      cc.style.transform = '';
                      cc.style.transition = '';
                      cc.classList.remove('flip-landing');
                    }
                  });
                }, 550);
              });
            });
          });
        });
      });      /* Delete selected: show confirm then animate and delete */
      document.getElementById("batchClearUnpinnedBtn").addEventListener("click", (e) => {
        e.stopPropagation();
        if (selectedIds.size === 0) return;
        showConfirmDialog(t("confirm_text"), function() {
          /* Animate selected cards */
          selectedIds.forEach(function(sid) {
            var c = document.querySelector('.card-row[data-id="' + sid + '"] .clip-card');
            if (c) { c.classList.add("removing"); }
          });
          window.electronAPI.batchDelete(Array.from(selectedIds)).then(function() {
            setTimeout(function() {
              isEditMode = false;
              selectedIds.clear();
              document.getElementById('batchDropdown').classList.remove('show');
              updateEditUI();
              fetchClips();
            }, 400);
          });
        });
      });

    /* Confirm dialog helper */
    let confirmCallback = null;

    function showConfirmDialog(message, onConfirm) {
      const overlay = document.getElementById("confirmOverlay");
      const text = document.getElementById("confirmText");
      const cancelBtn = document.getElementById("confirmCancelBtn");
      const okBtn = document.getElementById("confirmOkBtn");
      text.textContent = message;
      if (cancelBtn) cancelBtn.textContent = t("confirm_cancel");
      if (okBtn) okBtn.textContent = t("confirm_ok");
      confirmCallback = onConfirm;
      overlay.classList.add("show");
    }

    function hideConfirmDialog() {
      const overlay = document.getElementById("confirmOverlay");
      overlay.classList.remove("show");
      confirmCallback = null;
    }

    document.getElementById("confirmCancelBtn").addEventListener("click", hideConfirmDialog);
    document.getElementById("confirmOverlay").addEventListener("click", function(e) {
      if (e.target === this) hideConfirmDialog();
    });
    document.getElementById("confirmOkBtn").addEventListener("click", function() {
      if (confirmCallback) confirmCallback();
      hideConfirmDialog();
    });


    function escapeHtml(text) {
      return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // 窗口按钮：CSS 缩小淡出 → 隐藏 Electron 窗口
    const winEl = document.querySelector(".window");
    document.getElementById("minimizeBtn").addEventListener("click", () => {
      winEl.classList.add("minimizing");
      setTimeout(() => {
        window.electronAPI.closeWindow();
        winEl.classList.remove("minimizing");
      }, 350);
    });
    document.getElementById("closeBtn").addEventListener("click", () => {
      winEl.classList.add("minimizing");
      setTimeout(() => {
        window.electronAPI.quitApp();
      }, 350);
    });

    // 全局置顶图钉
    const pinBtn = document.getElementById("pinBtn");
    if (pinBtn) {
      let isPinned = false;
      pinBtn.addEventListener("click", () => {
        isPinned = !isPinned;
        pinBtn.classList.toggle("active", isPinned);
        window.electronAPI.setAlwaysOnTop(isPinned);
      });
    }


    // ===== 深色模式切换 =====
    const themeToggle = document.getElementById('themeToggle');

    function applyTheme(isDark) {
      document.body.classList.toggle('dark-mode', isDark);
      localStorage.setItem('cliply-dark-mode', isDark ? '1' : '0');
    }

    // 从 localStorage 恢复主题
    const savedTheme = localStorage.getItem('cliply-dark-mode');
    if (savedTheme === '1') {
      applyTheme(true);
    }

    // 点击切换
    themeToggle.addEventListener('click', () => {
      const isDark = !document.body.classList.contains('dark-mode');
      applyTheme(isDark);
    });

    // 初始化
    function initApp() { 
      // 语言初始化: IPC -> localStorage -> zh-CN
      if (window.electronAPI && window.electronAPI.getLanguage) {
        window.electronAPI.getLanguage().then(lang => {
          applyLanguage(lang);
        }).catch(() => {
          const saved = localStorage.getItem('clippin-lang') || 'zh-CN';
          applyLanguage(saved);
        });
      } else {
        const saved = localStorage.getItem('clippin-lang') || 'zh-CN';
        applyLanguage(saved);
      }

      if (window.electronAPI && window.electronAPI.listClips) {
        window.electronAPI.onWindowShown(() => {
          const w = document.querySelector(".window");
          w.classList.remove("minimizing");
          // 触发 CSS transition 从缩小态弹回正常
          void w.offsetWidth;
        });
        requestAnimationFrame(() => fetchClips());
        window.electronAPI.onNewClip(() => fetchClips());
      } else {
        setTimeout(initApp, 100);
      }
    }
    
        // Tooltip system
        (function() {
            const tip = document.getElementById("customTooltip");
            if (!tip) return;
            const labels = () => getTooltipLabels();

            document.addEventListener("mouseover", function(e) {
                if (!tip) return;
                const el = e.target.closest("[id], .btn-pin, .btn-copy, .btn-delete");
                if (!el) return;
                let key = el.id || "";
                if (!labels()[key]) {
                    if (el.classList.contains("btn-pin")) key = "btn-pin";
                    else if (el.classList.contains("btn-copy")) key = "btn-copy";
                    else if (el.classList.contains("btn-delete")) key = "btn-delete";
                }
                const text = labels()[key];
                if (!text) return;

                tip.textContent = text;
                tip.classList.add("show");
                const rect = el.getBoundingClientRect();
                tip.style.left = rect.left + rect.width / 2 + "px";
                tip.style.top = (rect.bottom + 6) + "px";
                tip.style.transform = "translateX(-50%) translateY(0)";
            });

            document.addEventListener("mouseout", function(e) {
                const el = e.target.closest("[id], .btn-pin, .btn-copy, .btn-delete");
                if (!el) return;
                if (!tip) return;
if (!el) return;
                tip.classList.remove("show");
            });
        })();

document.addEventListener('DOMContentLoaded', initApp);

</script>
